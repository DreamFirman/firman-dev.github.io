<!DOCTYPE html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <title>Keranjang | Animarket</title>
    <style>
      :root {
        --primary: #ee4d2d;
        --bg-light: #fff;
        --text-dark: #222;
      }

      * {
        box-sizing: border-box;
        transition: all 0.3s ease-in-out;
      }

      body {
        margin: 0;
        font-family: Arial, sans-serif;
        background: url("img/bg-checkout.jpg") no-repeat center center fixed;
        background-size: cover;
        color: var(--text-dark);
      }

      #navbar-placeholder {
        margin-bottom: 30px;
      }

      .container {
        max-width: 900px;
        margin: 40px auto;
        padding: 20px;
        background: var(--bg-light);
        border-radius: 12px;
        box-shadow: 0 0 20px rgba(0, 0, 0, 0.07);
        animation: fadeInSlide 0.5s ease-in-out;
      }

      @keyframes fadeInSlide {
        from {
          opacity: 0;
          transform: translateY(30px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      @keyframes fadeOut {
        to {
          opacity: 0;
          transform: translateX(50px);
        }
      }

      @keyframes fadeIn {
        from {
          opacity: 0;
          transform: translateY(20px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      @keyframes pop {
        0% {
          transform: scale(1);
        }
        50% {
          transform: scale(1.15);
        }
        100% {
          transform: scale(1);
        }
      }

      @keyframes pulse {
        0% {
          transform: scale(1);
        }
        50% {
          transform: scale(1.05);
          opacity: 0.9;
        }
        100% {
          transform: scale(1);
        }
      }

      .fade-in {
        animation: fadeIn 0.5s ease forwards;
      }

      .fade-out {
        animation: fadeOut 0.4s ease forwards;
      }

      h2 {
        text-align: center;
        color: var(--primary);
        margin-bottom: 30px;
      }

      .cart-item {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 16px 0;
        border-bottom: 1px solid #eee;
      }

      .cart-item img {
        width: 70px;
        height: 70px;
        object-fit: cover;
        border-radius: 6px;
        margin-right: 20px;
      }

      .item-info {
        flex: 1;
      }

      .item-name {
        font-weight: bold;
        margin-bottom: 6px;
      }

      .item-price {
        color: var(--primary);
        font-size: 14px;
      }

      .cart-actions {
        display: flex;
        align-items: center;
        gap: 10px;
      }

      .qty {
        width: 50px;
        padding: 4px;
        text-align: center;
        border: 1px solid #ccc;
        border-radius: 4px;
      }

      .btn-delete {
        background: none;
        border: none;
        font-size: 18px;
        cursor: pointer;
      }

      .total {
        text-align: right;
        font-size: 18px;
        font-weight: bold;
        margin-top: 20px;
        animation: pop 0.4s ease;
      }

      .btn-checkout {
        margin-top: 30px;
        width: 100%;
        background: var(--primary);
        color: white;
        border: none;
        padding: 14px;
        font-size: 16px;
        font-weight: bold;
        border-radius: 6px;
        cursor: pointer;
        transition: background 0.3s ease;
      }

      .btn-checkout:hover {
        background: #d8432b;
      }

      .btn-checkout.clicked {
        animation: pulse 0.3s ease;
      }

      .payment-method {
        margin-top: 30px;
      }

      .payment-method label {
        display: block;
        margin-bottom: 6px;
        cursor: pointer;
      }

      .qris-box {
        margin-top: 20px;
        display: none;
        text-align: center;
      }

      .qris-box img {
        width: 200px;
        margin-top: 10px;
      }

      .toast {
        position: fixed;
        bottom: 20px;
        right: 20px;
        background: #ee4d2d;
        color: white;
        padding: 12px 20px;
        border-radius: 6px;
        box-shadow: 0 3px 8px rgba(0, 0, 0, 0.2);
        opacity: 0;
        transform: translateY(20px);
        animation: toastIn 0.4s forwards;
        z-index: 9999;
      }

      @keyframes toastIn {
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      @media (max-width: 600px) {
        .cart-item {
          flex-direction: column;
          align-items: flex-start;
          gap: 10px;
        }

        .cart-actions {
          align-self: flex-end;
        }
      }
    </style>
  </head>
  <body>
    <div id="navbar-placeholder"></div>

    <div class="container">
      <h2>Keranjang Belanja</h2>
      <div id="cartItems"></div>
      <div class="total" id="totalHarga">Total: Rp 0</div>

      <div class="payment-method">
        <h3>Pilih Metode Pembayaran:</h3>
        <label><input type="radio" name="metode" value="QRIS" onchange="tampilQRIS()" /> QRIS (Scan Barcode)</label>
        <label><input type="radio" name="metode" value="Tunai" onchange="tampilQRIS()" /> Tunai (Bayar di Tempat)</label>
      </div>

      <div class="qris-box" id="qrisBox">
        <p>Silakan scan QRIS berikut untuk pembayaran:</p>
        <img src="img/spay.png" alt="QRIS" />
      </div>

      <button class="btn-checkout" onclick="checkout(this)">Checkout</button>
    </div>

    <script>
      const cart = JSON.parse(localStorage.getItem("cart")) || [];

      function formatRupiah(angka) {
        return "Rp " + angka.toLocaleString("id-ID");
      }

      function renderCart() {
        const cartItemsDiv = document.getElementById("cartItems");
        const totalDiv = document.getElementById("totalHarga");
        cartItemsDiv.innerHTML = "";
        let grandTotal = 0;

        cart.forEach((item, i) => {
          const total = item.harga * item.jumlah;
          grandTotal += total;

          const itemDiv = document.createElement("div");
          itemDiv.className = "cart-item fade-in";
          itemDiv.innerHTML = `
            <img src="${item.gambar}" alt="${item.nama}">
            <div class="item-info">
              <div class="item-name">${item.nama}</div>
              <div class="item-price">${formatRupiah(item.harga)} x ${item.jumlah}</div>
            </div>
            <div class="cart-actions">
              <input class="qty" type="number" min="1" value="${item.jumlah}" onchange="updateQty(${i}, this.value)">
              <button class="btn-delete" onclick="hapusItem(${i}, this)">🗑️</button>
            </div>
          `;
          cartItemsDiv.appendChild(itemDiv);
        });

        totalDiv.textContent = "Total: " + formatRupiah(grandTotal);
        totalDiv.style.animation = "none";
        setTimeout(() => {
          totalDiv.style.animation = "pop 0.4s ease";
        }, 10);
      }

      function updateQty(index, newQty) {
        cart[index].jumlah = parseInt(newQty);
        simpanCart();
        renderCart();
      }

      function hapusItem(index, btn) {
        const itemEl = btn.closest(".cart-item");
        itemEl.classList.add("fade-out");
        setTimeout(() => {
          cart.splice(index, 1);
          simpanCart();
          renderCart();
        }, 400);
      }

      function simpanCart() {
        localStorage.setItem("cart", JSON.stringify(cart));
      }

      function tampilQRIS() {
        const metode = document.querySelector('input[name="metode"]:checked');
        const qrisBox = document.getElementById("qrisBox");
        if (metode && metode.value === "QRIS") {
          qrisBox.style.display = "block";
        } else {
          qrisBox.style.display = "none";
        }
      }

      function checkout(button) {
        const metode = document.querySelector('input[name="metode"]:checked');
        if (!metode) {
          tampilkanToast("❗Silakan pilih metode pembayaran terlebih dahulu.");
          return;
        }

        if (cart.length > 0) {
          const waktu = new Date();
          const tanggal = waktu.toLocaleDateString("id-ID");
          const jam = waktu.toLocaleTimeString("id-ID");
          const total = cart.reduce((sum, item) => sum + item.harga * item.jumlah, 0);
          const terakhir = {
            nama: cart.map((i) => i.nama).join(", "),
            jumlah: cart.reduce((sum, i) => sum + i.jumlah, 0),
            total,
            metode: metode.value,
            tanggal: `${tanggal} ${jam}`,
          };
          localStorage.setItem("lastPurchase", JSON.stringify(terakhir));
        }

        setTimeout(() => {
          localStorage.removeItem("cart");
          cart.length = 0;
          renderCart();
          tampilkanToast("✅ Pembayaran dengan metode " + metode.value + " berhasil!");

          setTimeout(() => {
            window.location.href = "dashboard.html";
          }, 1500);
        }, 400);
      }

      function tampilkanToast(pesan) {
        const toast = document.createElement("div");
        toast.className = "toast";
        toast.textContent = pesan;
        document.body.appendChild(toast);
        setTimeout(() => {
          toast.style.opacity = "0";
          toast.style.transform = "translateY(20px)";
        }, 3000);
        setTimeout(() => toast.remove(), 4000);
      }

      fetch("navbar.html")
        .then((res) => res.text())
        .then((html) => {
          document.getElementById("navbar-placeholder").innerHTML = html;

          const savedTheme = localStorage.getItem("theme");
          if (savedTheme === "dark") {
            document.body.classList.add("dark");
          }

          const toggleBtn = document.querySelector(".theme-toggle");
          if (toggleBtn)
            toggleBtn.addEventListener("click", () => {
              document.body.classList.toggle("dark");
              localStorage.setItem("theme", document.body.classList.contains("dark") ? "dark" : "light");
            });

          updateClock();
          setInterval(updateClock, 1000);
        });

      function updateClock() {
        const now = new Date();
        const h = String(now.getHours()).padStart(2, "0");
        const m = String(now.getMinutes()).padStart(2, "0");
        const s = String(now.getSeconds()).padStart(2, "0");
        const clock = document.getElementById("clock");
        if (clock) clock.textContent = `${h}:${m}:${s}`;
      }

      renderCart();
    </script>
  </body>
</html>
