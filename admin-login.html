<!DOCTYPE html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <title>Login Admin | Animarket</title>
    <style>
      body {
        margin: 0;
        font-family: "Segoe UI", sans-serif;
        background: url("img/bg-log-min.png") no-repeat center center fixed;
        background-size: cover;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        position: relative;
      }

      .login-box {
        background: rgba(255, 255, 255, 0.95);
        padding: 40px;
        border-radius: 12px;
        box-shadow: 0 8px 24px rgba(0, 0, 0, 0.2);
        text-align: center;
        max-width: 400px;
        width: 100%;
        backdrop-filter: blur(4px);
      }

      h2 {
        margin-bottom: 20px;
        color: #ee4d2d;
      }

      input {
        width: 100%;
        padding: 12px;
        margin-bottom: 20px;
        border: 1px solid #ccc;
        border-radius: 8px;
      }

      button {
        background-color: #ee4d2d;
        color: white;
        border: none;
        padding: 10px 20px;
        border-radius: 8px;
        cursor: pointer;
      }

      .error {
        color: red;
        margin-bottom: 10px;
      }

      .shake {
        animation: shake 0.3s;
      }

      @keyframes shake {
        25% { transform: translateX(-5px); }
        50% { transform: translateX(5px); }
        75% { transform: translateX(-5px); }
      }

      .back-btn {
        position: absolute;
        top: 20px;
        left: 20px;
        background: rgba(119,119,119,0.9);
        color: white;
        padding: 10px;
        border-radius: 8px;
        text-decoration: none;
      }
    </style>
  </head>

  <body>
    <a href="index.html" class="back-btn">🔙 Kembali</a>

    <div class="login-box" id="loginBox">
      <h2>Masuk Admin</h2>
      <div class="error" id="errorMsg"></div>
      <input type="password" id="kodeAkses" placeholder="Masukkan kode akses" />
      <button onclick="verifikasiAdmin()">Masuk</button>
    </div>

    <script>
      // Kalau sudah login, langsung masuk panel
      if (localStorage.getItem("admin_akses") === "true") {
        window.location.href = "admin-panel.html";
      }

      function verifikasiAdmin() {
        const kode = document.getElementById("kodeAkses").value.trim();
        const errorDiv = document.getElementById("errorMsg");
        const box = document.getElementById("loginBox");

        if (kode === "admin123") {
          localStorage.setItem("admin_akses", "true");
          window.location.href = "admin-panel.html";
        } else {
          errorDiv.textContent = "❌ Kode akses salah!";
          box.classList.add("shake");
          setTimeout(() => box.classList.remove("shake"), 300);
        }
      }

      document.addEventListener("keydown", function (e) {
        if (e.key === "Enter") verifikasiAdmin();
      });
    </script>
  </body>
</html>
