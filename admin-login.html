<!DOCTYPE html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <title>Login Admin | Animarket</title>
    <style>
      body {
        margin: 0;
        font-family: "Segoe UI", sans-serif;
        background: url("img/bg-log-min.png") no-repeat center center fixed;
        background-size: cover;
        background-position: center;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        position: relative;
      }

      .login-box {
        background: rgba(255, 255, 255, 0.95);
        padding: 40px;
        border-radius: 12px;
        box-shadow: 0 8px 24px rgba(0, 0, 0, 0.2);
        text-align: center;
        max-width: 400px;
        width: 100%;
        backdrop-filter: blur(4px);
        transition: transform 0.2s ease;
      }

      h2 {
        margin-bottom: 20px;
        color: #ee4d2d;
      }

      input[type="password"] {
        width: 100%;
        padding: 12px;
        margin-bottom: 20px;
        border: 1px solid #ccc;
        border-radius: 8px;
        font-size: 16px;
        outline: none;
      }

      button {
        background-color: #ee4d2d;
        color: white;
        border: none;
        padding: 10px 20px;
        border-radius: 8px;
        font-size: 16px;
        cursor: pointer;
        transition: background-color 0.3s ease;
      }

      button:hover {
        background-color: #c93d24;
      }

      .error {
        color: red;
        margin-bottom: 15px;
        font-size: 14px;
        min-height: 20px;
      }

      .shake {
        animation: shake 0.3s;
      }

      @keyframes shake {
        0% {
          transform: translateX(0);
        }
        25% {
          transform: translateX(-5px);
        }
        50% {
          transform: translateX(5px);
        }
        75% {
          transform: translateX(-5px);
        }
        100% {
          transform: translateX(0);
        }
      }

      .back-btn {
        position: absolute;
        top: 20px;
        left: 20px;
        background: rgba(119, 119, 119, 0.9);
        color: white;
        padding: 10px 16px;
        border-radius: 8px;
        text-decoration: none;
        font-size: 14px;
        transition: background 0.3s ease;
      }

      .back-btn:hover {
        background: #555;
      }
    </style>
  </head>
  <body>
    <a href="dashboard.html" class="back-btn">🔙 Kembali ke Dashboard</a>

    <div class="login-box" id="loginBox">
      <h2>Masuk Admin</h2>
      <div class="error" id="errorMsg"></div>
      <input type="password" id="kodeAkses" placeholder="Masukkan kode akses" />
      <button onclick="verifikasiAdmin()">Masuk</button>
    </div>

    <script>
      function verifikasiAdmin() {
        const kode = document.getElementById("kodeAkses").value.trim();
        const errorDiv = document.getElementById("errorMsg");
        const loginBox = document.getElementById("loginBox");

        if (kode === "admin123") {
          localStorage.setItem("admin_akses", "true");
          window.location.href = "admin-panel.html";
        } else {
          errorDiv.textContent = "❌ Kode akses salah!";
          loginBox.classList.add("shake");
          setTimeout(() => {
            loginBox.classList.remove("shake");
          }, 300);
        }
      }

      // Tekan Enter langsung masuk
      document.addEventListener("keydown", function (e) {
        if (e.key === "Enter") {
          verifikasiAdmin();
        }
      });
    </script>
  </body>
</html>
