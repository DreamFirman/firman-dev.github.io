<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Login Admin</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: url("img/bg-log-min.png") center/cover no-repeat;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

.login-box {
  background: rgba(255,255,255,0.95);
  padding: 40px;
  border-radius: 10px;
  text-align: center;
}

input {
  padding: 10px;
  width: 100%;
  margin: 10px 0;
}

button {
  background: #ee4d2d;
  color: white;
  border: none;
  padding: 10px;
}
</style>
</head>

<body>

<div class="login-box">
  <h2>Login Admin</h2>
  <input type="password" id="kode" placeholder="Kode admin">
  <button onclick="login()">Masuk</button>
</div>

<script>
if (localStorage.getItem("admin_akses") === "true") {
  window.location.href = "admin-panel.html";
}

function login() {
  const kode = document.getElementById("kode").value;

  if (kode === "admin123") {
    localStorage.setItem("admin_akses", "true");
    window.location.href = "admin-panel.html";
  } else {
    alert("Kode salah!");
  }
}
</script>

</body>
</html>
