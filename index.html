<!DOCTYPE html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <title>Dashboard | Animarket</title>
    <style>
      :root {
        --primary: #ee4d2d;
        --bg-light: rgba(255, 255, 255, 0.85);
        --text-dark: #222;
        --text-light: #fff;
      }

      * {
        box-sizing: border-box;
        transition: all 0.3s ease-in-out;
      }

      body {
        margin: 0;
        font-family: Arial, sans-serif;
        background: url("img/background.png") no-repeat center center fixed;
        background-size: cover;
        opacity: 0;
        animation: fadeIn 1s ease forwards;
        color: var(--text-dark);
      }

      @keyframes fadeIn {
        to { opacity: 1; }
      }

      @keyframes slideUp {
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      header {
        background: var(--primary);
        padding: 10px 20px;
        color: var(--text-light);
        display: flex;
        justify-content: space-between;
      }

      nav a {
        color: white;
        margin-left: 20px;
        text-decoration: none;
        font-weight: bold;
      }

      .content {
        opacity: 0;
        transform: translateY(30px);
        animation: slideUp 1s ease forwards;
        animation-delay: 0.5s;
        padding: 30px;
        text-align: center;
        background: var(--bg-light);
        max-width: 700px;
        margin: 50px auto;
        border-radius: 10px;
      }

      .btn-logout {
        background: #fff;
        color: var(--primary);
        border: 2px solid var(--primary);
        padding: 10px 20px;
        border-radius: 5px;
        cursor: pointer;
      }

      /* Toast */
      .toast-denied {
        position: fixed;
        bottom: 20px;
        right: 20px;
        background: #c0392b;
        color: white;
        padding: 12px 20px;
        border-radius: 8px;
      }
    </style>
  </head>

  <body>
    <header>
      <div>🐾 Animarket</div>
      <div id="clock"></div>
    </header>

    <nav style="background:#ff7762; padding:10px">
      <a href="index.html">Beranda</a>
      <a href="produk.html">Produk</a>
      <a href="cart.html">Keranjang</a>
      <a href="profil.html">Profil</a>
      <a href="#" onclick="aksesAdmin()">Admin</a>
      <a href="#" onclick="confirmLogout()">Logout</a>
    </nav>

    <div class="content">
      <h2>Selamat Datang di Dashboard Animarket 🎉</h2>
      <p>Halo Meowzers!</p>
    </div>

    <script>
      function updateClock() {
        const now = new Date();
        document.getElementById("clock").textContent =
          now.toLocaleTimeString();
      }
      setInterval(updateClock, 1000);
      updateClock();

      function confirmLogout() {
        window.location.href = "login.html";
      }

      // ✅ FIX DI SINI
      function aksesAdmin() {
        const isAdmin = localStorage.getItem("admin_akses");

        if (isAdmin === "true") {
          window.location.href = "admin-panel.html";
        } else {
          // toast + redirect
          const toast = document.createElement("div");
          toast.className = "toast-denied";
          toast.textContent = "🔒 Login admin dulu...";
          document.body.appendChild(toast);

          setTimeout(() => {
            toast.remove();
            window.location.href = "admin-login.html";
          }, 1500);
        }
      }
    </script>
  </body>
</html>
