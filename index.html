<!DOCTYPE html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <title>Dashboard | Animarket</title>
    <style>
      :root {
        --primary: #ee4d2d;
        --bg-light: rgba(255, 255, 255, 0.85);
        --text-dark: #222;
        --text-light: #fff;
      }

      * {
        box-sizing: border-box;
        transition: all 0.3s ease-in-out;
      }

      body {
        margin: 0;
        font-family: Arial, sans-serif;
        background: url("img/background.png") no-repeat center center fixed;
        background-size: cover;
        opacity: 0;
        animation: fadeIn 1s ease forwards;
        color: var(--text-dark);
      }

      @keyframes fadeIn {
        to { opacity: 1; }
      }

      @keyframes slideUp {
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      header {
        background: var(--primary);
        padding: 10px 20px;
        color: var(--text-light);
        display: flex;
        align-items: center;
        justify-content: space-between;
      }

      .logo {
        font-size: 20px;
        font-weight: bold;
      }

      .header-right {
        display: flex;
        align-items: center;
        gap: 15px;
      }

      .clock {
        font-weight: bold;
        font-size: 14px;
      }

      nav a {
        color: var(--text-light);
        text-decoration: none;
        margin-left: 20px;
        font-weight: bold;
      }

      nav a:hover {
        text-decoration: underline;
        color: #ffdfdf;
      }

      .content {
        opacity: 0;
        transform: translateY(30px);
        animation: slideUp 1s ease forwards;
        animation-delay: 0.5s;
        animation-fill-mode: forwards;
        padding: 30px;
        text-align: center;
        background: var(--bg-light);
        max-width: 700px;
        margin: 50px auto;
        border-radius: 10px;
        box-shadow: 0 0 20px rgba(0, 0, 0, 0.1);
      }

      .btn-logout {
        background: #fff;
        color: var(--primary);
        border: 2px solid var(--primary);
        padding: 10px 20px;
        font-weight: bold;
        border-radius: 5px;
        cursor: pointer;
        margin-top: 30px;
        text-decoration: none;
      }

      .btn-logout:hover {
        background: var(--primary);
        color: #fff;
      }

      .theme-toggle {
        background: transparent;
        border: none;
        color: white;
        font-size: 16px;
        cursor: pointer;
      }

      footer {
        text-align: center;
        margin-top: 40px;
        font-size: 12px;
        color: #888;
      }

      /* Modal */
      #logoutModal {
        display: none;
        position: fixed;
        inset: 0;
        background: rgba(0, 0, 0, 0.5);
        z-index: 999;
        align-items: center;
        justify-content: center;
      }

      .modal-box {
        background: #fff;
        padding: 20px 30px;
        border-radius: 8px;
        text-align: center;
      }

      /* Toast */
      .toast-denied {
        position: fixed;
        bottom: 20px;
        right: 20px;
        background: #c0392b;
        color: white;
        padding: 12px 20px;
        border-radius: 8px;
        z-index: 9999;
      }
    </style>
  </head>

  <body>
    <header>
      <div class="logo">🐾 Animarket</div>
      <div class="header-right">
        <div class="clock" id="clock">00:00:00</div>
        <button class="theme-toggle" onclick="toggleTheme()">🌓</button>
      </div>
    </header>

    <nav style="background: #ff7762; padding: 8px 20px">
      <a href="index.html">Beranda</a>
      <a href="produk.html">Produk</a>
      <a href="cart.html">Keranjang</a>
      <a href="profil.html">Profil</a>
      <a href="#" onclick="aksesAdmin()">Admin</a>
      <a href="#" onclick="showLogoutModal()">Logout</a>
    </nav>

    <div class="content">
      <h2>Selamat Datang di Dashboard Animarket 🎉</h2>
      <p>Halo, <strong>Meowzers!</strong> 😺</p>
      <button class="btn-logout" onclick="showLogoutModal()">Keluar</button>
    </div>

    <footer>&copy; 2025 Animarket</footer>

    <div id="logoutModal">
      <div class="modal-box">
        <p>Yakin ingin keluar?</p>
        <button onclick="confirmLogout()">Ya</button>
        <button onclick="hideLogoutModal()">Batal</button>
      </div>
    </div>

    <script>
      function toggleTheme() {
        document.body.classList.toggle("dark");
      }

      function updateClock() {
        const now = new Date();
        document.getElementById("clock").textContent =
          now.toLocaleTimeString("id-ID");
      }

      setInterval(updateClock, 1000);
      updateClock();

      function showLogoutModal() {
        document.getElementById("logoutModal").style.display = "flex";
      }

      function hideLogoutModal() {
        document.getElementById("logoutModal").style.display = "none";
      }

      function confirmLogout() {
        window.location.href = "login.html";
      }

      // 🔥 FIX ADMIN (INI INTI PERBAIKAN)
      function aksesAdmin() {
        const isAdmin = localStorage.getItem("admin_akses");

        if (isAdmin === "true") {
          window.location.href = "admin-panel.html";
        } else {
          window.location.href = "admin-login.html";
        }
      }
    </script>
  </body>
</html>
